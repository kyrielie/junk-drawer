<!-- POSTCARD | id:postcard-scenic-01 | sender:senders[0] | z:12 | speed:0.12 -->
<div class="postcard">

  <div class="postcard-front">
    <div class="img-frame img-frame--postcard">
      <img src="./assets/media/{{images[0].file}}" alt="{{images[0].alt}}"
           onerror="this.closest('.img-frame').classList.add('img-missing')">
    </div>
    <div class="postcard-caption-bar">
      <span class="postcard-caption-text">{{config.scenicPostcard.location}}</span>
    </div>
  </div>

  <div class="postcard-back">
    <div class="postcard-divider" aria-hidden="true"></div>

    <div class="postcard-message">
      <p class="handwritten" style="font-size:0.72rem;line-height:1.75;">
        {{config.scenicPostcard.message}}
      </p>
      <p class="handwritten" style="font-size:0.72rem;font-weight:600;margin-top:6px;">
        — {{config.scenicPostcard.signoff}}
      </p>
    </div>

    <div class="postcard-address-col">
      <div class="stamp stamp--flora stamp--envelope" aria-label="{{config.scenicPostcard.stampDenom}} flora stamp">
        <svg class="stamp-svg" viewBox="0 0 52 62" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path class="stamp-perf" d="M4,2 Q6,0 8,2 Q10,4 12,2 Q14,0 16,2 Q18,4 20,2 Q22,0 24,2 Q26,4 28,2 Q30,0 32,2 Q34,4 36,2 Q38,0 40,2 Q42,4 44,2 Q46,0 48,2 Q50,4 52,2 L52,60 Q50,62 48,60 Q46,58 44,60 Q42,62 40,60 Q38,58 36,60 Q34,62 32,60 Q30,58 28,60 Q26,62 24,60 Q22,58 20,60 Q18,62 16,60 Q14,58 12,60 Q10,62 8,60 Q6,58 4,60 Q2,62 0,60 L0,2 Q2,0 4,2 Z"/>
          <rect x="4" y="4" width="44" height="54" fill="var(--color-aged-paper)"/>
          <ellipse cx="26" cy="22" rx="10" ry="13" fill="var(--color-stamp-red)" opacity="0.7"/>
          <ellipse cx="22" cy="19" rx="8" ry="10" fill="var(--color-stamp-red)" opacity="0.6"/>
          <ellipse cx="30" cy="19" rx="8" ry="10" fill="var(--color-stamp-red)" opacity="0.6"/>
          <circle cx="26" cy="20" r="4" fill="#D4A017" opacity="0.9"/>
          <rect x="24" y="30" width="3" height="12" fill="#4B6B3A"/>
          <ellipse cx="22" cy="35" rx="5" ry="3" fill="#4B6B3A" transform="rotate(-25 22 35)"/>
          <ellipse cx="30" cy="33" rx="5" ry="3" fill="#3D5A2E" transform="rotate(20 30 33)"/>
          <text x="26" y="56" text-anchor="middle" class="stamp-denom">{{config.scenicPostcard.stampDenom}}</text>
        </svg>
      </div>

      <div class="postmark postmark--red postmark--envelope" aria-label="Postmarked {{postmark}}">
        <svg viewBox="0 0 80 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M52,6 Q60,9 68,6 Q76,3 80,6 L80,30 Q76,33 68,30 Q60,27 52,30 Q44,33 36,30 L36,6 Q44,3 52,6Z" fill="none" stroke="currentColor" stroke-width="1"/>
          <line x1="38" y1="12" x2="78" y2="12" stroke="currentColor" stroke-width="0.75"/>
          <line x1="38" y1="18" x2="78" y2="18" stroke="currentColor" stroke-width="0.75"/>
          <line x1="38" y1="24" x2="78" y2="24" stroke="currentColor" stroke-width="0.75"/>
          <text x="18" y="10" text-anchor="middle" class="postmark-city">{{senders[0].city}}</text>
          <text x="18" y="20" text-anchor="middle" class="postmark-state">{{senders[0].state}}</text>
          <text x="18" y="30" text-anchor="middle" class="postmark-date">{{postmark}}</text>
        </svg>
      </div>

      <address class="mail-address mail-address--typed" style="font-size:0.68rem;line-height:1.6;margin-top:auto;">
        <span class="address-name" style="font-weight:700;">{{recipient.name}}</span><br>
        <span class="address-street">{{recipient.address}}</span><br>
        <span class="address-cityline">{{recipient.city}}, {{recipient.state}} {{recipient.zip}}</span>
      </address>

      <div class="barcode" data-zip="{{recipient.zip}}"></div>
    </div>
  </div>

</div>
