<!-- CLIPPING | id:clipping-dispatch-01 | sender:null | z:10 | speed:0.15 -->
<div class="clipping-dispatch">

  <div class="clipping-dispatch__stripe" aria-hidden="true"></div>

  <div class="clipping-dispatch__head clipping__masthead">
    <span class="clipping__masthead-name">{{config.clippingDispatch.paperName}}</span>
    <span class="clipping__masthead-section">{{config.clippingDispatch.volume}}</span>
  </div>

  <div class="clipping-dispatch__body">
    <div class="clipping-dispatch__headline">{{config.clippingDispatch.headline}}</div>
    <div class="clipping-dispatch__byline">
      By {{config.clippingDispatch.byline}} — {{config.clippingDispatch.date}}
    </div>
    <div class="clipping-dispatch__text">{{config.clippingDispatch.body}}</div>
  </div>

  <div class="clipping-dispatch__stripe--flip" aria-hidden="true"></div>

</div>
