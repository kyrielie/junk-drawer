<!-- POSTCARD | id:postcard-mom-01 | sender:mom | z:4 | speed:0.12 -->

<!--
  Fragment: postcard-mom-01
  A standard 4×6 postcard. Front side shows a coastal photo (img-frame with
  fallback). Flip is handled by CSS class 'is-flipped' toggled by rustle.js
  on double-click. Back side has the divided layout: message left, address right.
  Stamp: 32¢ flora design (pre-Jan 1999).
-->

<div class="postcard" data-flipped="false">

  <!-- ── FRONT ──────────────────────────────────────────────── -->
  <div class="postcard-front piece-front">

    <!-- Photo fills the front face -->
    <div class="img-frame img-frame--postcard">
      <img
        src="./assets/media/photo-02.jpg"
        alt="a blurry shot of a coastal town at dusk"
        onerror="this.closest('.img-frame').classList.add('img-missing')"
      >
    </div>

    <!-- Destination label printed small in bottom-left corner -->
    <div class="postcard-front-label">
      <span class="postcard-front-city">Medford, OR</span>
    </div>

  </div><!-- /postcard-front -->

  <!-- ── BACK ───────────────────────────────────────────────── -->
  <div class="postcard-back piece-back">

    <!-- Dividing rule between message and address columns -->
    <div class="postcard-divider" aria-hidden="true"></div>

    <!-- LEFT: handwritten message -->
    <div class="postcard-message">
      <p class="handwritten">
        Clara —<br><br>
        Drove up the coast yesterday.<br>
        Reminded me of that summer<br>
        we rented the cabin. The fog<br>
        was so thick you couldn't<br>
        see the water, just hear it.<br><br>
        Missing you.<br>
        — Mom
      </p>
    </div>

    <!-- RIGHT: address block + stamp + postmark -->
    <div class="postcard-address-col">

      <!-- Stamp: flora, 32¢ -->
      <div class="stamp stamp--flora" aria-label="32 cent flora stamp">
        <svg
          class="stamp-svg"
          viewBox="0 0 52 62"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <!-- Perforated border path (scalloped) -->
          <path class="stamp-perf" d="
            M4,2 Q6,0 8,2 Q10,4 12,2 Q14,0 16,2 Q18,4 20,2 Q22,0 24,2 Q26,4 28,2
            Q30,0 32,2 Q34,4 36,2 Q38,0 40,2 Q42,4 44,2 Q46,0 48,2 Q50,4 52,2
            L52,60 Q50,62 48,60 Q46,58 44,60 Q42,62 40,60 Q38,58 36,60 Q34,62 32,60
            Q30,58 28,60 Q26,62 24,60 Q22,58 20,60 Q18,62 16,60 Q14,58 12,60
            Q10,62 8,60 Q6,58 4,60 Q2,62 0,60
            L0,2 Q2,0 4,2 Z
          "/>
          <!-- Cream paper interior -->
          <rect x="4" y="4" width="44" height="54" fill="var(--color-aged-paper)"/>
          <!-- Flora illustration: simple stylised flower -->
          <g transform="translate(26,28)">
            <!-- Stem -->
            <line x1="0" y1="14" x2="0" y2="4"  stroke="#5A7A3A" stroke-width="1.5" stroke-linecap="round"/>
            <!-- Leaves -->
            <path d="M0,10 Q-7,6 -5,1 Q-2,5 0,8Z"  fill="#6A9B4A"/>
            <path d="M0,10 Q7,6 5,1  Q2,5  0,8Z"   fill="#6A9B4A"/>
            <!-- Petals -->
            <ellipse cx="0"  cy="-4"  rx="3.5" ry="5.5" fill="#E8A0B0" transform="rotate(0)"/>
            <ellipse cx="0"  cy="-4"  rx="3.5" ry="5.5" fill="#E8A0B0" transform="rotate(60)"/>
            <ellipse cx="0"  cy="-4"  rx="3.5" ry="5.5" fill="#E8A0B0" transform="rotate(120)"/>
            <ellipse cx="0"  cy="-4"  rx="3.5" ry="5.5" fill="#E8A0B0" transform="rotate(180)"/>
            <ellipse cx="0"  cy="-4"  rx="3.5" ry="5.5" fill="#E8A0B0" transform="rotate(240)"/>
            <ellipse cx="0"  cy="-4"  rx="3.5" ry="5.5" fill="#E8A0B0" transform="rotate(300)"/>
            <!-- Centre -->
            <circle cx="0" cy="0" r="4" fill="#F5C842"/>
          </g>
          <!-- Denomination -->
          <text x="26" y="56" text-anchor="middle" class="stamp-denom">32¢</text>
        </svg>
      </div><!-- /stamp -->

      <!-- Cancellation postmark -->
      <div class="postmark postmark--purple" aria-label="Postmarked {{postmark}}">
        <svg viewBox="0 0 80 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Wavy cancellation lines -->
          <path d="M52,6  Q60,9 68,6  Q76,3 80,6  L80,30 Q76,33 68,30 Q60,27 52,30 Q44,33 36,30 L36,6 Q44,3 52,6Z"
                fill="none" stroke="var(--color-cancellation-purple)" stroke-width="1"/>
          <line x1="38" y1="12" x2="78" y2="12" stroke="var(--color-cancellation-purple)" stroke-width="0.75"/>
          <line x1="38" y1="18" x2="78" y2="18" stroke="var(--color-cancellation-purple)" stroke-width="0.75"/>
          <line x1="38" y1="24" x2="78" y2="24" stroke="var(--color-cancellation-purple)" stroke-width="0.75"/>
          <!-- City arc -->
          <text x="18" y="10" text-anchor="middle" class="postmark-city">MEDFORD</text>
          <text x="18" y="20" text-anchor="middle" class="postmark-state">OR</text>
          <text x="18" y="30" text-anchor="middle" class="postmark-date">{{postmark}}</text>
        </svg>
      </div><!-- /postmark -->

      <!-- To address block -->
      <address class="mail-address mail-address--to">
        <span class="address-name">{{recipient.name}}</span>
        <span class="address-street">{{recipient.address}}</span>
        <span class="address-cityline">{{recipient.city}}, {{recipient.state}} {{recipient.zip}}</span>
      </address>

    </div><!-- /postcard-address-col -->

  </div><!-- /postcard-back -->

</div><!-- /postcard -->
