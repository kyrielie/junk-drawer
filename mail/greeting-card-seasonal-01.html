<!-- CARD | id:greeting-card-seasonal-01 | sender:senders[5] | z:11 | speed:0.22 -->
<div class="greeting-card-seasonal">

  <div class="greeting-card-seasonal__front piece-front"
       style="background:{{config.greetingCard.frontBg}};">
    <svg class="greeting-card-seasonal__front-motif"
         width="80" height="60" viewBox="0 0 80 60" aria-hidden="true">
      <path d="M10,50 Q30,38 40,20 Q50,38 70,50" fill="none"
            stroke="#4B6B3A" stroke-width="2.5"/>
      <ellipse cx="26" cy="36" rx="9" ry="5"
               fill="{{config.greetingCard.motifColor1}}"
               transform="rotate(-30 26 36)" opacity="0.85"/>
      <ellipse cx="40" cy="22" rx="9" ry="5"
               fill="{{config.greetingCard.motifColor1}}"
               transform="rotate(5 40 22)" opacity="0.85"/>
      <ellipse cx="54" cy="36" rx="9" ry="5"
               fill="{{config.greetingCard.motifColor2}}"
               transform="rotate(30 54 36)" opacity="0.85"/>
      <circle cx="40" cy="20" r="6"
              fill="{{config.greetingCard.motifColor2}}" opacity="0.9"/>
      <circle cx="40" cy="20" r="3" fill="#D4A017" opacity="0.85"/>
    </svg>
    <div class="greeting-card-seasonal__front-text">{{config.greetingCard.frontText}}</div>
  </div>

  <div class="greeting-card-seasonal__inside piece-back">
    <p class="greeting-card-seasonal__message">{{config.greetingCard.message}}</p>
    <p class="greeting-card-seasonal__closing">
      {{config.greetingCard.closing}}<br>
      <strong>{{senders[5].name}}</strong>
    </p>
  </div>

</div>
