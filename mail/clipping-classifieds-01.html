<div class="clipping-classifieds">

  <div class="clipping-classifieds__head clipping__masthead">
    <span class="clipping__masthead-name">{{config.classifieds.paperName}}</span>
    <span class="clipping__masthead-section">{{config.classifieds.section}}</span>
  </div>

  <div class="clipping-classifieds__body">
    <div class="clipping-classifieds__section-head">
      {{config.classifieds.heading}}
    </div>
    <p class="clipping-classifieds__ad">
      <strong>SEEKING:</strong> {{config.classifieds.ad1}}
    </p>
    <p class="clipping-classifieds__ad">
      <strong>FOR TRADE:</strong> {{config.classifieds.ad2}}
    </p>
    <p>
      <strong>FOUND:</strong> {{config.classifieds.ad3}}
    </p>
  </div>

</div>
